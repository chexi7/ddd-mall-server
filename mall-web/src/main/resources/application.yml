server:
  port: 8080

spring:
  application:
    name: mall
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

mall:
  jwt:
    secret: mall-ddd-secret-key-must-be-at-least-32-bytes
    expiration-ms: 86400000  # 24小时

logging:
  level:
    com.ddd.mall: DEBUG
    org.hibernate.SQL: DEBUG
